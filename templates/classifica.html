<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07090f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Classifica — Scaruffi Checker</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── Filtri ──────────────────────────────────────────────────────────── */
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .decade-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 13px;
      border-radius: 999px;
      cursor: pointer;
      transition: color var(--transition), background var(--transition),
                  border-color var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .decade-btn:hover {
      color: var(--text);
      border-color: var(--muted);
      background: rgba(255,255,255,0.05);
    }

    .decade-btn.active {
      background: var(--gold-glow);
      border-color: var(--gold-dim);
      color: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    /* ── Slider rating ───────────────────────────────────────────────────── */
    .rating-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .rating-filter label {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
    }

    .rating-filter input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    .rating-filter input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold-glow);
      cursor: pointer;
      transition: box-shadow var(--transition);
    }

    .rating-filter input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .rating-filter input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold-glow);
      cursor: pointer;
    }

    .rating-val {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      min-width: 28px;
      text-align: right;
    }

    /* ── Intestazione lista ──────────────────────────────────────────────── */
    .list-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }

    .list-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .list-count {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Stato caricamento / errore ─────────────────────────────────────── */
    .list-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Card album ──────────────────────────────────────────────────────── */
    .album-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .album-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      cursor: default;
      transition: background var(--transition), border-color var(--transition),
                  transform var(--transition), box-shadow var(--transition);
      opacity: 0;
      animation: fadeSlideIn 0.35s ease forwards;
    }

    .album-card:hover {
      background: rgba(17,24,39,0.95);
      transform: translateX(3px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    /* Border-left colori per rating */
    .album-card.tier-purple { border-left-color: #a855f7; }
    .album-card.tier-gold   { border-left-color: var(--gold); }
    .album-card.tier-green  { border-left-color: var(--green); }
    .album-card.tier-grey   { border-left-color: var(--muted); }

    .album-card:hover.tier-purple { box-shadow: 0 4px 18px rgba(168,85,247,0.15); }
    .album-card:hover.tier-gold   { box-shadow: 0 4px 18px var(--gold-glow); }
    .album-card:hover.tier-green  { box-shadow: 0 4px 18px var(--green-glow); }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Posizione */
    .album-pos {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Rating pill */
    .rating-pill {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .rating-pill.tier-purple {
      background: rgba(168,85,247,0.18);
      color: #c084fc;
      border: 1px solid rgba(168,85,247,0.35);
    }

    .rating-pill.tier-gold {
      background: var(--gold-glow);
      color: var(--gold);
      border: 1px solid rgba(245,158,11,0.35);
    }

    .rating-pill.tier-green {
      background: var(--green-glow);
      color: var(--green);
      border: 1px solid rgba(16,185,129,0.35);
    }

    .rating-pill.tier-grey {
      background: rgba(75,96,128,0.18);
      color: var(--muted);
      border: 1px solid rgba(75,96,128,0.3);
    }

    /* Testo album */
    .album-info {
      flex: 1;
      min-width: 0;
    }

    .album-title {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .album-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-meta .sep {
      margin: 0 5px;
      opacity: 0.5;
    }

    /* ── Nav active state ────────────────────────────────────────────────── */
    nav a.nav-active {
      color: var(--gold);
      background: var(--gold-glow);
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 580px) {
      .filters-bar {
        gap: 6px;
      }
      .rating-filter {
        margin-left: 0;
        width: 100%;
        justify-content: flex-end;
      }
      .album-card {
        gap: 10px;
        padding: 11px 12px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <header>
    <div class="header-inner">
      <h1>Scaruffi Checker</h1>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav id="main-nav">
        <a href="/">Setlist</a>
        <a href="/classifica" class="nav-active">Classifica</a>
        <a href="/stats">Stats</a>
        <a href="/scopri">Scopri</a>
        <a href="/quiz">Quiz</a>
      </nav>
    </div>
  </header>

  <main style="max-width:820px;margin:48px auto;padding:0 24px">

    <!-- ── Filtri ── -->
    <div class="filters-bar" id="filters-bar">
      <button class="decade-btn active" data-decade="all">Tutti</button>
      <button class="decade-btn" data-decade="1950">1950s</button>
      <button class="decade-btn" data-decade="1960">1960s</button>
      <button class="decade-btn" data-decade="1970">1970s</button>
      <button class="decade-btn" data-decade="1980">1980s</button>
      <button class="decade-btn" data-decade="1990">1990s</button>
      <button class="decade-btn" data-decade="2000">2000s</button>
      <button class="decade-btn" data-decade="2010">2010s</button>

      <div class="rating-filter">
        <label for="min-rating-slider">min</label>
        <input
          type="range"
          id="min-rating-slider"
          min="6" max="10" step="0.5" value="7"
          aria-label="Rating minimo"
        >
        <span class="rating-val" id="rating-val-display">7</span>
      </div>
    </div>

    <!-- ── Intestazione lista ── -->
    <div class="list-header">
      <h2>Top Album</h2>
      <span class="list-count" id="list-count"></span>
    </div>

    <!-- ── Contenitore risultati ── -->
    <div id="album-container">
      <div class="list-state" id="loading-state">
        <div class="spinner"></div>
        <span>Caricamento…</span>
      </div>
    </div>

  </main>

  <script src="/static/particles.js"></script>

  <script>
    /* ================================================================
       Classifica — logica fetch + render
    ================================================================ */

    // ── Stato corrente ────────────────────────────────────────────────
    let currentDecade  = 'all';
    let currentMinRating = 7;
    let fetchAbortCtrl = null;

    // ── Elementi DOM ──────────────────────────────────────────────────
    const container      = document.getElementById('album-container');
    const listCountEl    = document.getElementById('list-count');
    const slider         = document.getElementById('min-rating-slider');
    const ratingDisplay  = document.getElementById('rating-val-display');

    // ── Utility: tier da rating ────────────────────────────────────────
    function ratingTier(r) {
      if (r >= 9)  return 'purple';
      if (r >= 8)  return 'gold';
      if (r >= 7)  return 'green';
      return 'grey';
    }

    // ── Render lista ──────────────────────────────────────────────────
    function renderAlbums(albums) {
      if (!albums || albums.length === 0) {
        container.innerHTML = `
          <div class="list-state">
            <span>Nessun album trovato per questi filtri.</span>
          </div>`;
        listCountEl.textContent = '';
        return;
      }

      listCountEl.textContent = `${albums.length} album`;

      const list = document.createElement('div');
      list.className = 'album-list';

      albums.forEach((album, idx) => {
        const tier  = ratingTier(album.rating);
        const delay = Math.min(idx * 35, 700); // cap delay a 700ms

        const card = document.createElement('div');
        card.className = `album-card tier-${tier}`;
        card.style.animationDelay = `${delay}ms`;

        const titleText  = escHtml(album.album  || album.title || '—');
        const artistText = escHtml(album.artist  || '—');
        const yearText   = album.year ? escHtml(String(album.year)) : '';
        const ratingText = album.rating !== undefined
          ? Number(album.rating).toFixed(1)
          : '—';

        card.innerHTML = `
          <span class="album-pos">#${idx + 1}</span>
          <span class="rating-pill tier-${tier}">${ratingText}</span>
          <div class="album-info">
            <div class="album-title">${titleText}</div>
            <div class="album-meta">
              ${artistText}${yearText ? `<span class="sep">·</span>${yearText}` : ''}
            </div>
          </div>`;

        list.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(list);
    }

    // ── Escape HTML di base ───────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Stato caricamento ─────────────────────────────────────────────
    function showLoading() {
      container.innerHTML = `
        <div class="list-state" id="loading-state">
          <div class="spinner"></div>
          <span>Caricamento…</span>
        </div>`;
      listCountEl.textContent = '';
    }

    function showError(msg) {
      container.innerHTML = `
        <div class="list-state">
          <span style="color:var(--red)">⚠ ${escHtml(msg)}</span>
        </div>`;
      listCountEl.textContent = '';
    }

    // ── Fetch principale ──────────────────────────────────────────────
    async function loadAlbums() {
      // Annulla fetch precedente se ancora in corso
      if (fetchAbortCtrl) fetchAbortCtrl.abort();
      fetchAbortCtrl = new AbortController();

      showLoading();

      const params = new URLSearchParams({
        min_rating: currentMinRating,
        limit: 50,
      });
      if (currentDecade !== 'all') {
        params.set('decade', currentDecade);
      }

      const url = `/api/top-albums?${params.toString()}`;

      try {
        const res = await fetch(url, { signal: fetchAbortCtrl.signal });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        }

        const data = await res.json();

        // Supporta sia { albums: [...] } che array diretto
        const albums = Array.isArray(data) ? data : (data.albums || data.results || []);
        renderAlbums(albums);

      } catch (err) {
        if (err.name === 'AbortError') return; // fetch annullata intenzionalmente
        console.error('[classifica] fetch error:', err);
        showError('Impossibile caricare i dati. Riprova tra poco.');
      } finally {
        fetchAbortCtrl = null;
      }
    }

    // ── Bottoni decade ────────────────────────────────────────────────
    document.getElementById('filters-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.decade-btn');
      if (!btn) return;

      // Aggiorna stile active
      document.querySelectorAll('.decade-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      currentDecade = btn.dataset.decade;
      loadAlbums();
    });

    // ── Slider min_rating ─────────────────────────────────────────────
    slider.addEventListener('input', () => {
      const val = parseFloat(slider.value);
      ratingDisplay.textContent = Number.isInteger(val) ? String(val) : val.toFixed(1);
    });

    // Debounce sul fetch (400ms dopo l'ultimo movimento)
    let sliderTimer = null;
    slider.addEventListener('input', () => {
      clearTimeout(sliderTimer);
      sliderTimer = setTimeout(() => {
        currentMinRating = parseFloat(slider.value);
        loadAlbums();
      }, 400);
    });

    // ── Hamburger menu (mobile) ───────────────────────────────────────
    const navToggle = document.getElementById('nav-toggle');
    const mainNav   = document.getElementById('main-nav');
    if (navToggle && mainNav) {
      navToggle.addEventListener('click', () => {
        const open = mainNav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', open);
      });
    }

    // ── Init ──────────────────────────────────────────────────────────
    loadAlbums();
  </script>
</body>
</html>
